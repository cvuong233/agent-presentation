<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACMB Lineup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 24px; border-bottom: 2px solid #e94560; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.4rem; color: #fff; }
  header span { font-size: 0.85rem; color: #888; margin-left: auto; }
  .tabs { display: flex; gap: 8px; padding: 16px 24px 0; background: #0f0f1a; }
  .tab { padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; font-size: 0.9rem; border: 1px solid #2a2a3e; border-bottom: none; color: #888; background: #1a1a2e; transition: all 0.2s; }
  .tab.active { background: #16213e; color: #fff; border-color: #e94560; }
  .content { display: none; padding: 0 24px 32px; }
  .content.active { display: block; }
  .battle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 900px) { .battle-grid { grid-template-columns: 1fr; } }
  .battle-card { background: #16213e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a3e; }
  .card-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .card-header.night { background: linear-gradient(90deg, #1a0533, #2d1b4e); border-bottom: 2px solid #7c3aed; }
  .card-header.morning { background: linear-gradient(90deg, #0a1e3d, #0f3460); border-bottom: 2px solid #0ea5e9; }
  .card-header h2 { font-size: 1rem; font-weight: 700; }
  .card-header .time { font-size: 0.8rem; color: #aaa; margin-left: auto; }
  .slot-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .night .slot-badge { background: #7c3aed33; color: #a78bfa; border: 1px solid #7c3aed; }
  .morning .slot-badge { background: #0ea5e933; color: #7dd3fc; border: 1px solid #0ea5e9; }
  .section-counts { display: flex; gap: 10px; padding: 8px 18px; background: #0f0f1a; flex-wrap: wrap; }
  .count-badge { font-size: 0.78rem; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
  .count-main { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
  .count-sub  { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
  .count-off  { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
  .count-open { background: #6b728022; color: #9ca3af; border: 1px solid #6b728044; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: #0a0d1a; color: #555; font-size: 0.72rem; text-transform: uppercase; padding: 7px 12px; text-align: left; letter-spacing: 0.05em; }
  td { padding: 7px 12px; border-bottom: 1px solid #1e1e30; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2a3e; }
  .rank-divider td { background: #0a0d1a; color: #444; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 4px 12px; }
  .section-divider td { background: #0f0f1a; color: #555; font-size: 0.72rem; font-weight: 700; padding: 5px 12px; border-top: 1px solid #2a2a3e; }
  .rank-badge { font-size: 0.7rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
  .rank-badge.r5 { background: #fbbf2422; border: 1px solid #fbbf24; color: #fbbf24; }
  .rank-badge.r4 { background: #f9731622; border: 1px solid #f97316; color: #f97316; }
  .rank-badge.r3 { background: #60a5fa22; border: 1px solid #60a5fa; color: #60a5fa; }
  .rank-badge.r2 { background: #a3e63522; border: 1px solid #a3e635; color: #a3e635; }
  .rank-badge.r1 { background: #94a3b822; border: 1px solid #94a3b8; color: #94a3b8; }
  .num { color: #555; font-size: 0.78rem; width: 28px; }
  .player-name { font-weight: 500; }
  .reason { font-size: 0.78rem; color: #888; }
  .reason.positive { color: #22c55e; }
  .reason.warning { color: #f59e0b; }
  .reason.new-player { color: #a78bfa; }
  .reason.off { color: #ef4444; }
  .sub-row td { opacity: 0.75; }
  .off-row td { opacity: 0.55; }
  .open-slots { color: #6b7280; font-size: 0.8rem; padding: 10px 12px; text-align: center; background: #0a0d1a; border-top: 1px dashed #2a2a3e; font-style: italic; }
</style>
</head>
<body>

<header>
  <div>⚔️</div>
  <h1>ACMB — Battle Lineup</h1>
  <span id="week-label">Tuần 2026-03-30</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sm')">🏜️ Bão Sa Mạc</div>
  <div class="tab" onclick="switchTab('hn')">⛰️ Bão Hẻm Núi</div>
</div>

<div class="content active" id="tab-sm">
  <div class="battle-grid">
    <div class="battle-card" id="sm-a"></div>
    <div class="battle-card" id="sm-b"></div>
  </div>
</div>

<div class="content" id="tab-hn">
  <div class="battle-grid">
    <div class="battle-card" id="hn-a"></div>
    <div class="battle-card" id="hn-b"></div>
  </div>
</div>

<script>
const RANK_ORDER = {R5:0, R4:1, R3:2, R2:3, R1:4};
function rankSort(a, b) {
  return (RANK_ORDER[a.r] ?? 9) - (RANK_ORDER[b.r] ?? 9);
}

function reasonClass(p) {
  if (p.type === 'new') return 'new-player';
  if (p.type === 'off') return 'off';
  if (p.type === 'warning') return 'warning';
  return 'positive';
}

function buildCard(mode, slot, data) {
  const d = data.lineup[mode][slot];
  const isNight = d.period === 'night';
  const periodClass = isNight ? 'night' : 'morning';
  const periodLabel = isNight ? '🌙 Night' : '☀️ Morning';
  const openSlots = d.maxMain - d.main.length;

  const sorted = [...d.main].sort(rankSort);
  const sortedSubs = [...d.subs].sort(rankSort);
  const sortedOff = [...d.off].sort(rankSort);

  const counts = `
    <div class="section-counts">
      <span class="count-badge count-main">✅ Main: ${d.main.length}/${d.maxMain}</span>
      ${d.subs.length ? `<span class="count-badge count-sub">🔄 Sub: ${d.subs.length}</span>` : ''}
      ${d.off.length ? `<span class="count-badge count-off">❌ Day-off: ${d.off.length}</span>` : ''}      ${openSlots > 0 ? `<span class="count-badge count-open">🔓 Open: ${openSlots}</span>` : ''}
    </div>
    <div class="section-counts" style="padding-top:0">
      ${['R5','R4','R3','R2','R1'].map(r => {
        const n = sorted.filter(p => p.r === r).length;
        return n > 0 ? `<span class="count-badge rank-badge ${r.toLowerCase()}">${r}: ${n}</span>` : '';
      }).join('')}
    </div>`;

  let rows = '';
  let lastR = null;
  let num = 1;
  for (const p of sorted) {
    if (p.r !== lastR) {
      rows += `<tr class="rank-divider"><td colspan="4">── ${p.r} ──</td></tr>`;
      lastR = p.r;
    }
    rows += `<tr>
      <td class="num">${num++}</td>
      <td><span class="rank-badge ${p.r.toLowerCase()}">${p.r}</span></td>
      <td class="player-name">${p.name}</td>
      <td class="reason ${reasonClass(p)}">${p.reason}</td>
    </tr>`;
  }

  let subRows = '';
  if (sortedSubs.length > 0) {
    subRows += `<tr class="section-divider"><td colspan="4">🔄 Substitutes (${sortedSubs.length})</td></tr>`;
    sortedSubs.forEach((p, i) => {
      subRows += `<tr class="sub-row">
        <td class="num">S${i+1}</td>
        <td><span class="rank-badge ${p.r.toLowerCase()}">${p.r}</span></td>
        <td class="player-name">${p.name}</td>
        <td class="reason ${reasonClass(p)}">${p.reason}</td>
      </tr>`;
    });
  }

  let offRows = '';
  if (sortedOff.length > 0) {
    offRows += `<tr class="section-divider"><td colspan="4">❌ Day-off (${sortedOff.length})</td></tr>`;
    sortedOff.forEach((p, i) => {
      offRows += `<tr class="off-row">
        <td class="num">-</td>
        <td><span class="rank-badge ${p.r.toLowerCase()}">${p.r}</span></td>
        <td class="player-name">${p.name}</td>
        <td class="reason off">${p.reason}</td>
      </tr>`;
    });
  }

  return `
    <div class="card-header ${periodClass}">
      <div>
        <h2>Team ${slot}</h2>
        <div style="font-size:0.78rem;color:#aaa;margin-top:2px">${d.date}</div>
      </div>
      <span class="slot-badge">${periodLabel} ${d.time}</span>
    </div>
    ${counts}
    <table>
      <thead><tr><th>#</th><th>R</th><th>Player</th><th>Reason</th></tr></thead>
      <tbody>${rows}${subRows}${offRows}</tbody>
    </table>
  `;
}

function render(data) {
  document.getElementById('week-label').textContent = 'Cập nhật: ' + (data.meta && data.meta.updated || '');
  ['sm','hn'].forEach(mode => {
    ['A','B'].forEach(slot => {
      document.getElementById(`${mode}-${slot.toLowerCase()}`).innerHTML = buildCard(mode, slot, data);
    });
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['sm','hn'][i]===tab));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

fetch('./players.json')
  .then(r => r.json())
  .then(data => render(data))
  .catch(e => document.body.innerHTML += `<p style="color:red;padding:20px">Failed to load players.json: ${e}</p>`);
</script>
</body>
</html>
