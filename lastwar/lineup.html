<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACMB Lineup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

  /* header */
  header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 24px; border-bottom: 2px solid #e94560; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 1.4rem; color: #fff; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .header-right span { font-size: 0.85rem; color: #888; }
  .lang-toggle { display: flex; background: #0f0f1a; border-radius: 6px; overflow: hidden; border: 1px solid #2a2a3e; }
  .lang-btn { padding: 4px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #888; transition: all 0.2s; }
  .lang-btn.active { background: #e94560; color: #fff; }

  /* tabs */
  .tabs { display: flex; gap: 8px; padding: 16px 24px 0; background: #0f0f1a; }
  .tab { padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; font-size: 0.9rem; border: 1px solid #2a2a3e; border-bottom: none; color: #888; background: #1a1a2e; transition: all 0.2s; }
  .tab.active { background: #16213e; color: #fff; border-color: #e94560; }
  .content { display: none; padding: 0 24px 32px; }
  .content.active { display: block; }

  /* grid */
  .battle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 900px) { .battle-grid { grid-template-columns: 1fr; } }

  /* battle card */
  .battle-card { background: #16213e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a3e; }
  .card-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .card-header.night { background: linear-gradient(90deg, #1a0533, #2d1b4e); border-bottom: 2px solid #7c3aed; }
  .card-header.morning { background: linear-gradient(90deg, #0a1e3d, #0f3460); border-bottom: 2px solid #0ea5e9; }
  .card-header.evening { background: linear-gradient(90deg, #2d1b0e, #3d2b1e); border-bottom: 2px solid #f97316; }
  .card-header h2 { font-size: 1rem; font-weight: 700; }
  .slot-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; margin-left: auto; }
  .night .slot-badge { background: #7c3aed33; color: #a78bfa; border: 1px solid #7c3aed; }
  .morning .slot-badge { background: #0ea5e933; color: #7dd3fc; border: 1px solid #0ea5e9; }
  .evening .slot-badge { background: #f9731633; color: #fdba74; border: 1px solid #f97316; }

  /* summary badges */
  .summary-bar { display: flex; gap: 8px; padding: 10px 18px; background: #0a0d1a; flex-wrap: wrap; }
  .count-badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
  .count-main { background: #22c55e18; color: #22c55e; border: 1px solid #22c55e44; }
  .count-sub  { background: #f59e0b18; color: #f59e0b; border: 1px solid #f59e0b44; }
  .count-dayoff { background: #8b5cf618; color: #a78bfa; border: 1px solid #8b5cf644; }
  .count-open { background: #6b728018; color: #9ca3af; border: 1px solid #6b728044; }

  /* section blocks */
  .section-block { margin: 8px 10px; border-radius: 8px; overflow: hidden; border: 1px solid #2a2a3e; }
  .section-block:last-child { margin-bottom: 14px; }

  .section-header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.03em; }
  .section-header .section-count { font-size: 0.72rem; font-weight: 500; opacity: 0.7; }

  /* main section */
  .section-block.main-section { border-color: #22c55e44; }
  .section-block.main-section .section-header { background: linear-gradient(90deg, #0a1a0f, #0f2518); color: #22c55e; border-bottom: 1px solid #22c55e33; }

  /* sub section */
  .section-block.sub-section { border-color: #f59e0b44; }
  .section-block.sub-section .section-header { background: linear-gradient(90deg, #1a150a, #25200f); color: #f59e0b; border-bottom: 1px solid #f59e0b33; }

  /* dayoff section */
  .section-block.dayoff-section { border-color: #8b5cf644; }
  .section-block.dayoff-section .section-header { background: linear-gradient(90deg, #150a1a, #1e0f2a); color: #a78bfa; border-bottom: 1px solid #8b5cf633; }

  /* rank badges row */
  .rank-summary { display: flex; gap: 6px; padding: 6px 14px; background: #0a0d1a; flex-wrap: wrap; border-bottom: 1px solid #1e1e30; }

  /* table inside sections */
  .section-block table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .section-block th { background: #0a0d1a; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 6px 12px; text-align: left; letter-spacing: 0.05em; }
  .section-block td { padding: 6px 12px; border-bottom: 1px solid #1a1a2e; vertical-align: middle; }
  .section-block tr:last-child td { border-bottom: none; }
  .section-block tr:hover td { background: #1e2a3e; }

  /* main rows */
  .main-section tbody { background: #0d1a12; }
  .main-section tr:hover td { background: #132a1a; }

  /* sub rows */
  .sub-section tbody { background: #1a150d; }
  .sub-section td { opacity: 0.85; }
  .sub-section tr:hover td { background: #2a200f; opacity: 1; }

  /* dayoff rows */
  .dayoff-section tbody { background: #140d1a; }
  .dayoff-section td { opacity: 0.65; }
  .dayoff-section tr:hover td { background: #1e0f2a; opacity: 1; }

  /* rank divider */
  .rank-divider td { background: #080b14 !important; color: #444; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 3px 12px; }

  /* badges & text */
  .rank-badge { font-size: 0.7rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; display: inline-block; }
  .rank-badge.r5 { background: #fbbf2422; border: 1px solid #fbbf24; color: #fbbf24; }
  .rank-badge.r4 { background: #f9731622; border: 1px solid #f97316; color: #f97316; }
  .rank-badge.r3 { background: #60a5fa22; border: 1px solid #60a5fa; color: #60a5fa; }
  .rank-badge.r2 { background: #a3e63522; border: 1px solid #a3e635; color: #a3e635; }
  .rank-badge.r1 { background: #94a3b822; border: 1px solid #94a3b8; color: #94a3b8; }
  .num { color: #555; font-size: 0.78rem; width: 28px; }
  .player-name { font-weight: 500; }
  .reason { font-size: 0.78rem; color: #888; }
  .reason.positive { color: #4ade80; }
  .reason.warning { color: #fbbf24; }
  .reason.new-player { color: #a78bfa; }
  .reason.dayoff-reason { color: #8b5cf6; }

  /* empty state */
  .empty-note { padding: 12px 14px; font-size: 0.8rem; color: #555; font-style: italic; text-align: center; }
</style>
</head>
<body>

<header>
  <div>⚔️</div>
  <h1 data-i18n="title">ACMB — Đội Hình Chiến Đấu</h1>
  <div class="header-right">
    <span id="week-label"></span>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('vi')">🇻🇳 VI</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sm')">🏜️ <span data-i18n="tab_sm">Bão Sa Mạc</span></div>
  <div class="tab" onclick="switchTab('hn')">⛰️ <span data-i18n="tab_hn">Bão Hẻm Núi</span></div>
</div>

<div class="content active" id="tab-sm">
  <div class="battle-grid">
    <div class="battle-card" id="sm-a"></div>
    <div class="battle-card" id="sm-b"></div>
  </div>
</div>

<div class="content" id="tab-hn">
  <div class="battle-grid">
    <div class="battle-card" id="hn-a"></div>
    <div class="battle-card" id="hn-b"></div>
  </div>
</div>

<script>
const I18N = {
  vi: {
    title: 'ACMB — Đội Hình Chiến Đấu',
    tab_sm: 'Bão Sa Mạc', tab_hn: 'Bão Hẻm Núi',
    updated: 'Cập nhật', team: 'Đội',
    main: 'Chính thức', sub: 'Dự bị', dayoff: 'Nghỉ phép', open: 'Trống',
    main_header: '✅ ĐỘI CHÍNH', sub_header: '🔄 DỰ BỊ', dayoff_header: '😴 NGHỈ PHÉP',
    player: 'Người chơi', reason: 'Ghi chú',
    night: '🌙 Tối', morning: '☀️ Sáng', evening: '🌅 Chiều',
    transferred: 'Chuyển đội', new_to_slot: 'Mới vào đội',
    overflow: 'tràn', no_subs: 'Không có dự bị', no_dayoff: ''
  },
  en: {
    title: 'ACMB — Battle Lineup',
    tab_sm: 'Desert Storm Battle', tab_hn: 'Canyon Storm Battle',
    updated: 'Updated', team: 'Team',
    main: 'Main', sub: 'Sub', dayoff: 'Day-off', open: 'Open',
    main_header: '✅ MAIN ROSTER', sub_header: '🔄 SUBSTITUTES', dayoff_header: '😴 DAY-OFF',
    player: 'Player', reason: 'Note',
    night: '🌙 Night', morning: '☀️ Morning', evening: '🌅 Evening',
    transferred: 'Transferred', new_to_slot: 'New to slot',
    overflow: 'overflow', no_subs: 'No substitutes', no_dayoff: ''
  }
};

let currentLang = localStorage.getItem('acmb_lang') || 'vi';
let loadedData = null;
function t(key) { return (I18N[currentLang] || I18N.vi)[key] || key; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('acmb_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(lang.toUpperCase())));
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  if (loadedData) render(loadedData);
}

function localizeReason(reason) {
  if (currentLang !== 'vi') return reason;
  return reason
    .replace('Transferred from SM-A', 'Chuyển từ BSM-A')
    .replace('Transferred from SM-B', 'Chuyển từ BSM-B')
    .replace('Transferred', t('transferred'))
    .replace('New to slot', t('new_to_slot'))
    .replace(/1 YC/g, '1 thẻ vàng')
    .replace('overflow', 'tràn')
    .replace('was ', 'hạng ');
}

const RANK_ORDER = {R5:0, R4:1, R3:2, R2:3, R1:4};
function rankSort(a, b) { return (RANK_ORDER[a.r]??9) - (RANK_ORDER[b.r]??9); }

function reasonClass(p, section) {
  if (section === 'dayoff') return 'dayoff-reason';
  const r = (p.reason || '').toLowerCase();
  if (r.includes('yc') || r.includes('thẻ vàng')) return 'warning';
  if (r.includes('transfer') || r.includes('chuyển') || r.includes('new') || r.includes('mới')) return 'new-player';
  return 'positive';
}

function buildTable(players, section, startNum) {
  if (!players.length) return '';
  const sorted = [...players].sort(rankSort);
  let html = `<table><thead><tr><th style="width:32px">#</th><th style="width:40px">R</th><th>${t('player')}</th><th>${t('reason')}</th></tr></thead><tbody>`;
  let lastR = null;
  let num = startNum || 1;
  for (const p of sorted) {
    if (p.r !== lastR) {
      html += `<tr class="rank-divider"><td colspan="4">── ${p.r} ──</td></tr>`;
      lastR = p.r;
    }
    const prefix = section === 'main' ? num++ : section === 'sub' ? 'S'+(num++) : '—';
    html += `<tr>
      <td class="num">${prefix}</td>
      <td><span class="rank-badge ${p.r.toLowerCase()}">${p.r}</span></td>
      <td class="player-name">${p.name}</td>
      <td class="reason ${reasonClass(p, section)}">${localizeReason(p.reason)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function rankBadges(players) {
  const sorted = [...players].sort(rankSort);
  return ['R5','R4','R3','R2','R1'].map(r => {
    const n = sorted.filter(p => p.r === r).length;
    return n > 0 ? `<span class="rank-badge ${r.toLowerCase()}" style="font-size:0.68rem">${r}: ${n}</span>` : '';
  }).join('');
}

function buildCard(mode, slot, data) {
  const d = data.lineup[mode][slot];
  const periodClass = d.period === 'night' ? 'night' : d.period === 'evening' ? 'evening' : 'morning';
  const openSlots = d.maxMain - d.main.length;
  const dayoff = d.dayoff || [];

  // Summary bar
  const summary = `<div class="summary-bar">
    <span class="count-badge count-main">✅ ${t('main')}: ${d.main.length}/${d.maxMain}</span>
    ${d.subs.length ? `<span class="count-badge count-sub">🔄 ${t('sub')}: ${d.subs.length}</span>` : ''}
    ${dayoff.length ? `<span class="count-badge count-dayoff">😴 ${t('dayoff')}: ${dayoff.length}</span>` : ''}
    ${openSlots > 0 ? `<span class="count-badge count-open">🔓 ${t('open')}: ${openSlots}</span>` : ''}
  </div>`;

  // Main section
  const mainSection = `<div class="section-block main-section">
    <div class="section-header">${t('main_header')} <span class="section-count">(${d.main.length}/${d.maxMain})</span></div>
    <div class="rank-summary">${rankBadges(d.main)}</div>
    ${buildTable(d.main, 'main', 1)}
  </div>`;

  // Sub section (only if there are subs)
  let subSection = '';
  if (d.subs.length > 0) {
    subSection = `<div class="section-block sub-section">
      <div class="section-header">${t('sub_header')} <span class="section-count">(${d.subs.length})</span></div>
      ${buildTable(d.subs, 'sub', 1)}
    </div>`;
  }

  // Dayoff section (only if there are dayoff players)
  let dayoffSection = '';
  if (dayoff.length > 0) {
    dayoffSection = `<div class="section-block dayoff-section">
      <div class="section-header">${t('dayoff_header')} <span class="section-count">(${dayoff.length})</span></div>
      ${buildTable(dayoff, 'dayoff', 1)}
    </div>`;
  }

  return `
    <div class="card-header ${periodClass}">
      <div>
        <h2>${t('team')} ${slot}</h2>
        <div style="font-size:0.78rem;color:#aaa;margin-top:2px">${d.date || ''}</div>
      </div>
      <span class="slot-badge">${t(d.period)} ${d.time}</span>
    </div>
    ${summary}
    ${mainSection}
    ${subSection}
    ${dayoffSection}
  `;
}

function render(data) {
  document.getElementById('week-label').textContent = t('updated') + ': ' + (data.meta?.updated || '');
  ['sm','hn'].forEach(mode => {
    ['A','B'].forEach(slot => {
      const el = document.getElementById(`${mode}-${slot.toLowerCase()}`);
      if (el) el.innerHTML = buildCard(mode, slot, data);
    });
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['sm','hn'][i]===tab));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

fetch('./players.json')
  .then(r => r.json())
  .then(data => { loadedData = data; setLang(currentLang); })
  .catch(e => document.body.innerHTML += `<p style="color:red;padding:20px">Error: ${e}</p>`);
</script>
</body>
</html>
