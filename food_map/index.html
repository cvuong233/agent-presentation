<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 Ăn Gì Hôm Nay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0e0e0e;
    color: #f0ece4;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(160deg, #1a0a00 0%, #2d1200 45%, #221008 100%);
    padding: 40px 32px 30px;
    border-bottom: 1px solid #3a1f00;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 36px rgba(0,0,0,0.28);
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 0%, rgba(255,157,77,0.08) 45%, transparent 90%);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, #ff6b0022 0%, transparent 60%);
    pointer-events: none;
  }
  header h1 {
    position: relative;
    z-index: 1;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 4vw, 2.3rem);
    color: #ff9d4d;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  header p { position: relative; z-index: 1; color: #a88968; font-size: 0.92rem; margin-top: 6px; }

  /* Filter bar */
  .filters {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    background: linear-gradient(180deg, #161616 0%, #131313 100%);
    border-bottom: 1px solid #272727;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(4px);
  }
  #cuisine-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid #383838;
    background: #1f1f1f;
    color: #b7b7b7;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    line-height: 1.2;
  }
  .filter-btn:hover, .filter-btn.active {
    background: linear-gradient(135deg, #ff6b00, #ff8f39);
    border-color: #ff6b00;
    color: #fff;
    box-shadow: 0 6px 18px rgba(255,107,0,0.28);
  }
  .filter-btn.locate {
    margin-left: auto;
    background: #162219;
    border-color: #2f5e3a;
    color: #84d99a;
  }
  .filter-btn.locate:hover { background: #245532; color: #d7ffe1; }
  #sort-info { font-size: 0.78rem; color: #7c7c7c; padding: 0 4px; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: linear-gradient(165deg, #1c1c1c 0%, #181818 100%);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #2b2b2b;
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    cursor: pointer;
    position: relative;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 42px #ff6b0024;
    border-color: #ff6b0050;
  }

  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    background: #222;
    flex-shrink: 0;
  }
  .card-img-placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #1f1208, #2d1a0a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    flex-shrink: 0;
  }
  .slider-wrap {
    position: relative;
    overflow: hidden;
    height: 200px;
    background: #111;
  }
  .slider-track {
    display: flex;
    height: 100%;
    transition: transform 0.3s ease;
    will-change: transform;
  }
  .slider-dot-wrap {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }
  .slider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: background 0.2s;
  }
  .slider-dot.active { background: #fff; }
  .slider-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 14px;
    cursor: pointer;
    z-index: 3;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.82;
    transition: opacity 0.2s, transform 0.2s, background 0.2s;
    touch-action: manipulation;
  }
  .slider-arrow:hover { background: rgba(20,20,20,0.75); transform: translateY(-50%) scale(1.04); }
  .slider-wrap:hover .slider-arrow { opacity: 1; }
  .slider-arrow.prev { left: 7px; }
  .slider-arrow.next { right: 7px; }

  .card-body { padding: 16px 18px 18px; }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .tag-cuisine { background: #2a1a00; color: #ff9d4d; border: 1px solid #3a2a00; }
  .tag-price   { background: #001a10; color: #4dffaa; border: 1px solid #003a20; }
  .tag-dist    { background: #001020; color: #4daaff; border: 1px solid #002040; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: #f0ece4;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-address {
    font-size: 0.78rem;
    color: #666;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-rating {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .stars { color: #ff9d4d; font-size: 0.9rem; letter-spacing: 1px; }
  .rating-score { font-size: 0.82rem; color: #888; }

  .card-note {
    font-size: 0.8rem;
    color: #998877;
    font-style: italic;
    border-top: 1px solid #2a2a2a;
    padding-top: 10px;
    margin-top: 8px;
    line-height: 1.5;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn-map {
    flex: 1;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid #3a3a3a;
    background: #242424;
    color: #b9b9b9;
    font-size: 0.78rem;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .btn-map:hover { background: #343434; color: #fff; border-color: #4a4a4a; }
  .btn-grab { border-color: #00b14f55; color: #5ee79b; background: #123322; }
  .btn-grab:hover { background: #00b14f; color: #fff; border-color: #00b14f; }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: #444;
  }
  .empty .icon { font-size: 4rem; margin-bottom: 16px; }
  .empty p { font-size: 1rem; }

  /* Distance badge */
  .dist-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #000000aa;
    backdrop-filter: blur(4px);
    color: #4daaff;
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid #4daaff44;
  }

  /* Count */
  .count { color: #7a7a7a; font-size: 0.82rem; margin-left: auto; }

  @media (max-width: 900px) {
    .grid {
      padding: 20px 18px 28px;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    header {
      padding: 30px 18px 22px;
    }
    .filters {
      padding: 12px 14px;
      gap: 8px;
    }
    .filter-btn.locate {
      margin-left: 0;
    }
    .count {
      width: 100%;
      margin-left: 0;
      margin-top: 2px;
      font-size: 0.78rem;
    }
  }

  @media (max-width: 600px) {
    .card-body {
      padding: 14px 14px 15px;
    }
    .card-name {
      font-size: 1.08rem;
    }
    .slider-arrow {
      opacity: 0.95;
      width: 32px;
      height: 32px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>🍜 Ăn Gì Hôm Nay?</h1>
  <p id="subtitle">Danh sách địa điểm ăn uống</p>
</header>

<div class="filters">
  <button class="filter-btn active" id="all-filter-btn" onclick="filterBy('all', this)">Tất cả</button>
  <div id="cuisine-filters"></div>
  <button class="filter-btn locate" onclick="locateMe()">📍 Gần tôi</button>
  <span id="sort-info"></span>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<script>
let allPlaces = [];
let userLat = null, userLon = null;
let activeFilter = 'all';

async function loadData() {
  const res = await fetch('places.json?' + Date.now());
  const data = await res.json();
  allPlaces = Array.isArray(data) ? data : (data.places || []);
  render();
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function locateMe() {
  if (!navigator.geolocation) return alert('Trình duyệt không hỗ trợ định vị');
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById('sort-info').textContent = '📍 Đang sắp xếp theo khoảng cách';
    render();
  }, () => alert('Không lấy được vị trí'));
}

function getCuisineValue(place) {
  if (!place || typeof place !== 'object') return '';
  return (place.cuisine || place.category || '').toString().trim();
}

function getPlaceLon(place) {
  if (!place || typeof place !== 'object') return null;
  const raw = place.lon ?? place.lng;
  if (raw === null || raw === undefined || raw === '') return null;
  const parsed = Number(raw);
  return Number.isFinite(parsed) ? parsed : null;
}

function getPlaceLat(place) {
  if (!place || typeof place !== 'object') return null;
  const raw = place.lat;
  if (raw === null || raw === undefined || raw === '') return null;
  const parsed = Number(raw);
  return Number.isFinite(parsed) ? parsed : null;
}

function filterBy(cuisine, btnEl) {
  activeFilter = cuisine;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btnEl && btnEl.classList) btnEl.classList.add('active');
  render();
}

function stars(rating) {
  if (!rating) return '';
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}

function priceLabel(price) {
  if (!price) return '';
  if (price === 1) return '₫ Bình dân';
  if (price === 2) return '₫₫ Trung bình';
  if (price === 3) return '₫₫₫ Cao cấp';
  return price;
}

function render() {
  const grid = document.getElementById('grid');
  const cuisineContainer = document.getElementById('cuisine-filters');

  // Build cuisine/category filter buttons
  const cuisines = [...new Set(allPlaces.map(getCuisineValue).filter(Boolean))];
  cuisineContainer.innerHTML = cuisines.map(c =>
    `<button class="filter-btn ${activeFilter===c?'active':''}" onclick="filterBy('${c.replace(/'/g, "\\'")}', this)">${c}</button>`
  ).join('');

  // Filter
  let places = activeFilter === 'all'
    ? [...allPlaces]
    : allPlaces.filter(p => getCuisineValue(p) === activeFilter);

  // Sort by distance if available
  if (userLat !== null && userLon !== null) {
    places.forEach(p => {
      const lat = getPlaceLat(p);
      const lon = getPlaceLon(p);
      if (lat !== null && lon !== null) p._dist = haversine(userLat, userLon, lat, lon);
      else p._dist = 99999;
    });
    places.sort((a,b) => a._dist - b._dist);
  }

  document.getElementById('count').textContent = `${places.length} địa điểm`;
  document.getElementById('subtitle').textContent = places.length
    ? `${places.length} địa điểm đã lưu`
    : 'Chưa có địa điểm nào';

  if (places.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">🍽️</div><p>Chưa có địa điểm nào. Hãy gửi hình ảnh nhà hàng!</p></div>`;
    return;
  }

  grid.innerHTML = places.map(p => {
    const dist = p._dist && p._dist < 9999 ? `${p._dist < 1 ? (p._dist*1000).toFixed(0)+'m' : p._dist.toFixed(1)+'km'}` : null;
    const imgs = p.images || (p.photo ? [p.photo] : p.image ? [p.image] : []);
    const slideId = 'sl-' + p.id;
    let imgHtml;
    if (imgs.length === 0) {
      imgHtml = `<div class="card-img-placeholder">${p.emoji || '🍽️'}</div>`;
    } else if (imgs.length === 1) {
      imgHtml = `<div class="slider-wrap"><img class="card-img" src="${imgs[0]}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>🍽️</div>'"></div>`;
    } else {
      const slides = imgs.map(s => `<img class="card-img" src="${s}" alt="${p.name}" onerror="this.style.opacity=0">`).join('');
      const dots = imgs.map((_,i) => `<span class="slider-dot${i===0?' active':''}" onclick="sliderGo('${slideId}',${i})"></span>`).join('');
      imgHtml = `<div class="slider-wrap" id="${slideId}" data-idx="0" data-len="${imgs.length}"
        ontouchstart="sliderTouch(this,event,'start')" ontouchend="sliderTouch(this,event,'end')">
        <div class="slider-track">${slides}</div>
        <button class="slider-arrow prev" onclick="sliderStep('${slideId}',-1)">&#8249;</button>
        <button class="slider-arrow next" onclick="sliderStep('${slideId}',1)">&#8250;</button>
        <div class="slider-dot-wrap">${dots}</div>
      </div>`;
    }

    return `<div class="card">
      ${imgHtml}
      ${dist ? `<div class="dist-badge">📍 ${dist}</div>` : ''}
      <div class="card-body">
        <div class="card-tags">
          ${getCuisineValue(p) ? `<span class="tag tag-cuisine">${getCuisineValue(p)}</span>` : ''}
          ${p.price ? `<span class="tag tag-price">${String(p.price)}</span>` : ''}
          ${dist ? `<span class="tag tag-dist">${dist}</span>` : ''}
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-address">📍 ${p.address || 'Chưa có địa chỉ'}</div>
        ${p.rating ? `<div class="card-rating"><span class="stars">${stars(p.rating)}</span><span class="rating-score">${p.rating}/5</span></div>` : ''}
        ${p.note ? `<div class="card-note">"${p.note}"</div>` : ''}
        <div class="card-actions">
          ${p.maps_url ? `<a class="btn-map" href="${p.maps_url}" target="_blank">🗺️ Xem bản đồ</a>` : ''}
          ${p.phone ? `<a class="btn-map" href="tel:${p.phone}">📞 Gọi</a>` : ''}
          ${p.address ? `<button class="btn-map btn-grab" onclick="grabGo('${p.address.replace(/'/g,"\\'")}')">🚗 Grab</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function sliderGo(id, idx) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = parseInt(el.dataset.len);
  idx = ((idx % len) + len) % len;
  el.dataset.idx = idx;
  el.querySelector('.slider-track').style.transform = `translateX(-${idx * 100}%)`;
  el.querySelectorAll('.slider-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}
function sliderStep(id, dir) {
  const el = document.getElementById(id);
  if (!el) return;
  sliderGo(id, parseInt(el.dataset.idx) + dir);
}
function sliderTouch(el, e, phase) {
  if (!el) return;
  if (phase === 'start') {
    el.dataset.touchX = e.changedTouches[0].clientX;
    return;
  }
  const startX = Number(el.dataset.touchX || 0);
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) sliderStep(el.id, dx < 0 ? 1 : -1);
  delete el.dataset.touchX;
}

loadData();

function grabGo(address) {
  navigator.clipboard.writeText(address).catch(() => {});
  window.location.href = `grab://open?screenType=BOOKING&type=CAR&dropOffAddress=${encodeURIComponent(address)}`;
}
</script>
</body>
</html>
